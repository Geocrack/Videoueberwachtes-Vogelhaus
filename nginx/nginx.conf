server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /ws/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend:5000;
    }

    location /health {
        proxy_pass http://backend:5000;
    }
}
